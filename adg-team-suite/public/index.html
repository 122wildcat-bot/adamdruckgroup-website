<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ADG Team Suite</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="mark">ADG</span>
      <span class="sub">Team Suite</span>
    </div>
    <div class="userbox" id="userbox" hidden>
      <span class="who" id="who"></span>
      <span class="badge" id="adminBadge" hidden>Admin</span>
      <button class="btn-link" id="logout">Sign out</button>
    </div>
  </header>

  <main class="wrap">
    <div class="page-head">
      <h1>Your tools, all in one place</h1>
      <p>Click any tool to open it. Everything stays exactly where it lives — this is just your front door.</p>
    </div>
    <div id="catalog"></div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
