<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · ADG Team Suite</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <form class="auth-card" id="form">
      <div class="logo">ADG Team Suite</div>
      <div class="tag">Sign in to your Adam Druck Group workspace</div>
      <div class="msg" id="msg"></div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>
      <button class="submit" id="submit" type="submit">Sign in</button>
      <div class="alt">No account yet? <a href="/signup">Create one</a></div>
      <div class="muted-foot">Adam Druck Group — internal team tools</div>
    </form>
  </div>
  <script>
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');
    const submit = document.getElementById('submit');

    if (localStorage.getItem('adg_token')) location.href = '/';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'msg';
      submit.disabled = true;
      submit.textContent = 'Signing in…';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Sign in failed');
        localStorage.setItem('adg_token', data.token);
        location.href = '/';
      } catch (err) {
        msg.textContent = err.message;
        msg.className = 'msg error';
        submit.disabled = false;
        submit.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
